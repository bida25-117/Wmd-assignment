<h1>COLLABORATE WITH US</h1>
    
    <p>Partner with the 31 Esports community</p>



        <h2>Let's Work Together</h2>
<form class="form-card" id="collabForm" action="https://formspree.io/f/xlgzbqao" method="POST">

    <label>Company Name</label>
    <input type="text" name="company" placeholder="Company name" required>

    <label>Contact Person</label>
    <input type="text" name="contact" placeholder="Full name" required>

    <label>Email Address</label>
    <input type="email" name="email" placeholder="example@email.com" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" placeholder="+267 71 112 447">

    <label>Partnership Type</label>
    <select name="type" required>
        <option value="">Select type</option>
        <option value="tournament">Tournament Sponsorship</option>
        <option value="brand">Brand Partnership</option>
        <option value="content">Content Creation</option>
        <option value="venue">Venue Sponsorship</option>
        <option value="product">Product Sponsorship</option>
    </select>

    <label>Message</label>
    <textarea name="message" placeholder="Tell us your idea..." rows="5" required></textarea>

    <button type="submit">Submit</button>

</form>
 
   
    
<script>
const form = document.getElementById("collabForm");

form.addEventListener("submit", (e) => {

    const company = document.getElementById("company").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const email = document.getElementById("email").value.trim();
    const type = document.getElementById("type").value;
    const message = document.getElementById("message").value.trim();

    if (!company || !contact || !email || !type || !message) {
        alert("Fill in all required fields.");
        e.preventDefault();
        return;
    }

    const emailCheck = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailCheck.test(email)) {
        alert("Enter a valid email.");
        e.preventDefault();
        return;
    }

});
</script>
