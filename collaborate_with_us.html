<h1>COLLABORATE WITH US</h1>
    
    <p>Partner with the 31 Esports community</p>



        <h2>Let's Work Together</h2>

        
<form class="form-card">

    <div class="input-group">
        <label for="company">Company Name</label>
        <input type="text" id="company" placeholder="e.g. 31 Esports" required>
    </div>

    <div class="input-group">
        <label for="contact">Contact Person</label>
        <input type="text" id="contact" placeholder="Full name of representative" required>
    </div>

    <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" required>
    </div>

    <div class="input-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="+267 71 234 567 (optional)">
    </div>

    <div class="input-group">
        <label for="type">Partnership Type</label>
        <select id="type" required>
            <option value="">Select partnership type</option>
            <option>Tournament Sponsorship</option>
            <option>Brand Partnership</option>
            <option>Content Creation</option>
            <option>Venue Sponsorship</option>
            <option>Product sponsorship</option>
        </select>
    </div>

    <div class="input-group">
        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Tell us about your idea, sponsorship or collaboration..." required></textarea>
    </div>

    <button type="submit" class="cta-btn">Submit Application</button>


        </form>

    </div>

</section>
